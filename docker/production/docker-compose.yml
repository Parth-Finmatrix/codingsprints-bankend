version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  gateway:
    image: parth731/codingsprints-gateway:latest
    command: node dist/apps/gateway/main.js
    ports:
      - '8000:8000'
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka

  authentication:
    image: parth731/codingsprints-authentication:latest
    command: node dist/apps/authentication/main.js
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka

  tutorials:
    image: parth731/codingsprints-tutorials:latest
    command: node dist/apps/tutorials/main.js
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka

