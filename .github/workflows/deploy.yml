name: CI/CD Deployment

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Gateway
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gateway -f docker/production/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gateway

      - name: Build Authentication
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/authentication -f docker/production/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authentication

      - name: Build Tutorials
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tutorials -f docker/production/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tutorials

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /root/app/backend
            docker compose pull
            docker compose down
            docker compose up -d
